version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: applai
      POSTGRES_PASSWORD: applai_pass
      POSTGRES_DB: applai_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  backend:
    build: ./backend
    command: npm run dev
    environment:
      DATABASE_URL: postgres://applai:applai_pass@db:5432/applai_db
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: <your-openai-api-key>
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
  frontend:
    build: ./frontend
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
volumes:
  db_data:
